name: ci

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm db:generate
      - name: TypeScript typecheck
        run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        working-directory: apps/agent-py
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run Python Agent tests
        run: python -m pytest apps/agent-py/test_sovereign_flow.py -x -q

  death-line:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Death Line Linter
        run: python scripts/lint_death_line.py
      - name: Run import-linter
        working-directory: apps/agent-py
        run: |
          pip install import-linter
          lint-imports

  phase1-harness:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ai_ecom
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start MinIO
        run: |
          docker run -d --name minio-srv \
            --network host \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 15); do
            curl -sf http://localhost:9000/minio/health/live && break || sleep 2
          done
      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_ecom
        run: pnpm db:generate
      - name: Enable pgvector extension
        run: psql postgresql://postgres:postgres@localhost:5432/ai_ecom -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run Prisma migrations
        run: |
          DB="postgresql://postgres:postgres@localhost:5432/ai_ecom"
          for f in packages/database/prisma/migrations/*/migration.sql; do
            echo ">>> Applying: $f"
            psql "$DB" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Apply setup-app-user.sql
        run: psql postgresql://postgres:postgres@localhost:5432/ai_ecom -v ON_ERROR_STOP=1 -f scripts/setup-app-user.sql
      - name: Apply week1 RLS hardening
        run: psql postgresql://postgres:postgres@localhost:5432/ai_ecom -v ON_ERROR_STOP=1 -f packages/database/migrations/0001_week1_hardening.sql
      - name: Apply tenant_plan migration
        run: psql postgresql://postgres:postgres@localhost:5432/ai_ecom -v ON_ERROR_STOP=1 -f packages/database/migrations/0002_tenant_plan.sql
      - name: Apply RLS governance migration
        run: psql postgresql://postgres:postgres@localhost:5432/ai_ecom -v ON_ERROR_STOP=1 -f packages/database/migrations/0003_rls_governance_tables.sql
      - name: Seed harness data
        id: seed
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_ecom
        run: |
          printf 'DATABASE_URL=%s\n' "$DATABASE_URL" > apps/api/.env
          pnpm --filter @apps/api seed:harness 2>&1 | tee /tmp/seed.log
      - name: Post seed log
        if: steps.seed.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          BODY=$(jq -Rs '.' < /tmp/seed.log)
          curl -sf -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/commits/$SHA/comments" \
            -d "{\"body\": $BODY}"
      - name: Fail if seed failed
        if: steps.seed.outcome == 'failure'
        run: exit 1
      - name: Install Python test deps
        run: pip install pytest psycopg2-binary redis boto3
      - name: Run API integration tests
        id: apitests
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_ecom
        run: pnpm --filter @apps/api test:integration 2>&1 | tee /tmp/apitest.log
      - name: Run Phase 1 Harness (12 items)
        id: harness
        continue-on-error: true
        env:
          DATABASE_ADMIN_URL: postgresql://postgres:postgres@localhost:5432/ai_ecom
          DATABASE_URL: postgresql://app_user:app_user_password@localhost:5432/ai_ecom
          REDIS_URL: redis://localhost:6379
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
        run: |
          pytest tests/test_phase1_harness.py -v 2>&1 | tee /tmp/harness.log
      - name: Post test logs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          LOG="=== API Integration Tests ===\n$(cat /tmp/apitest.log 2>/dev/null | tail -50)\n\n=== Harness Tests ===\n$(cat /tmp/harness.log 2>/dev/null | tail -80)"
          BODY=$(printf '%s' "$LOG" | jq -Rs '.')
          curl -sf -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/commits/$SHA/comments" \
            -d "{\"body\": $BODY}"
      - name: Check harness gate
        run: grep "12 passed" /tmp/harness.log
