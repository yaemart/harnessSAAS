$schema: https://json-schema.org/draft/2020-12/schema
$id: tool-call
# References: openapi.yaml#/components/schemas/ToolCall

type: object
properties:
  toolId:
    type: string
  toolType:
    type: string
    enum: [read, write]
  input:
    type: object
    additionalProperties: true
  output:
    type: object
    additionalProperties: true
  durationMs:
    type: number
  status:
    type: string
    enum: [SUCCESS, FAILED, TIMEOUT]
  error:
    type: string
    nullable: true
required: [toolId, toolType, input, output, durationMs, status]
